<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Eye Tracking 👁️👾</title>
    <style>
        /* Reset margins */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Clean center layout for monster */
        body {
            background-color: #1a1a2e; /* Dark purple/blue background */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        h1 {
            color: #e94560;
            margin-bottom: 30px;
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.4);
            text-align: center;
            padding: 0 10px;
        }

        /* Monster Face Container */
        .monster {
            width: 260px;
            height: 260px;
            background-color: #833ab4; /* Cute Purple Monster Body */
            border-radius: 60px 60px 30px 30px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 -15px 0 rgba(0,0,0,0.15);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Monster Horns (Seeng) */
        .monster::before, .monster::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 60px;
            background-color: #e94560;
            top: -30px;
            border-radius: 50% 50% 0 0;
            z-index: -1;
        }
        .monster::before { left: 40px; transform: rotate(-20deg); }
        .monster::after { right: 40px; transform: rotate(20deg); }

        /* Eyes Container */
        .eyes-container {
            display: flex;
            gap: 25px;
            margin-top: -30px;
        }

        /* White Part of Eye */
        .eye {
            width: 75px;
            height: 75px;
            background-color: white;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 0 rgba(0,0,0,0.1);
        }

        /* Pupils (Kala Chashma/Putli jo ghoomegi) */
        .pupil {
            width: 32px;
            height: 32px;
            background-color: #0f3460; /* Dark blue pupil */
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* Start at perfect center */
            transition: 0.05s ease-out; /* Smooth tracking response */
        }

        /* White shine inside pupil to make it look alive */
        .pupil::before {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: white;
            border-radius: 50%;
            top: 5px;
            left: 5px;
        }

        /* Cute Monster Mouth */
        .mouth {
            width: 90px;
            height: 40px;
            background-color: #0f3460;
            position: absolute;
            bottom: 45px;
            border-radius: 10px 10px 50px 50px;
            overflow: hidden;
            box-shadow: inset 0 5px 0 rgba(0,0,0,0.2);
        }

        /* Monster Tooth (Daant) */
        .mouth::before {
            content: '';
            position: absolute;
            width: 25px;
            height: 15px;
            background-color: white;
            top: 0;
            left: 20px;
            border-radius: 0 0 5px 5px;
        }
    </style>
</head>
<body>

    <h1>FEED THE MONSTER WITH YOUR CURSOR! 👾</h1>

    <!-- The Monster Face -->
    <div class="monster">
        <div class="eyes-container">
            <div class="eye">
                <div class="pupil"></div>
            </div>
            <div class="eye">
                <div class="pupil"></div>
            </div>
        </div>
        <div class="mouth"></div>
    </div>

    <!-- JavaScript to calculate trigonometry math for eye rotation -->
    <script>
        const pupils = document.querySelectorAll('.pupil');

        function moveEyes(e) {
            // Get mouse/touch position
            let mouseX = e.clientX || (e.touches && e.touches[0].clientX);
            let mouseY = e.clientY || (e.touches && e.touches[0].clientY);

            if (!mouseX || !mouseY) return;

            pupils.forEach(pupil => {
                // Get the exact center point of each eye
                const eyeRect = pupil.parentElement.getBoundingClientRect();
                const eyeCenterX = eyeRect.left + eyeRect.width / 2;
                const eyeCenterY = eyeRect.top + eyeRect.height / 2;

                // Angle calculate karne ka standard Trigonometry logic (Math.atan2)
                const angle = Math.atan2(mouseY - eyeCenterY, mouseX - eyeCenterX);
                
                // Eyeball kitna door tak ghum sakta hai (Max distance in pixels)
                const maxDistance = 18; 

                // X and Y offset calculations
                const pupilX = Math.cos(angle) * maxDistance;
                const pupilY = Math.sin(angle) * maxDistance;

                // Apply dynamic styles to move the pupils
                pupil.style.transform = `translate(calc(-50% + ${pupilX}px), calc(-50% + ${pupilY}px))`;
            });
        }

        // Listen for both desktop mouse and mobile touch actions
        window.addEventListener('mousemove', moveEyes);
        window.addEventListener('touchmove', moveEyes);
    </script>
</body>
</html>
