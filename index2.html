<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Wormhole</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #020205; overflow: hidden; width: 100vw; height: 100vh; }
        canvas { display: block; position: absolute; top:0; left:0; will-change: transform; filter: drop-shadow(0 0 10px #ff0055); }
    </style>
</head>
<body>
    <canvas id="wormholeCanvas"></canvas>
    <script>
        const canvas = document.getElementById('wormholeCanvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.z = Math.random() * canvas.width; // Depth factor
                this.color = Math.random() > 0.5 ? '#ff0055' : '#00ffff';
            }
            update() {
                this.z -= 4; // Particle ko paas laane ke liye speed
                if (this.z <= 0) this.reset();

                // Gravity pull towards mouse
                this.x += (mouse.x - this.x) * 0.02;
                this.y += (mouse.y - this.y) * 0.02;
            }
            draw() {
                // 3D Projection math logic
                const k = 128 / this.z;
                const px = (this.x - canvas.width / 2) * k + canvas.width / 2;
                const py = (this.y - canvas.height / 2) * k + canvas.height / 2;
                const size = (1 - this.z / canvas.width) * 4;

                if (px >= 0 && px <= canvas.width && py >= 0 && py <= canvas.height) {
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(px, py, Math.max(0.5, size), 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    this.reset();
                }
            }
        }

        const particles = Array.from({ length: 350 }, () => new Particle());

        function animate() {
            ctx.fillStyle = 'rgba(2, 2, 5, 0.2)'; // Smooth trail effect
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
