<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Space Shooter Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #050510;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            background-color: #020205;
            display: block;
            border: 2px solid #390099;
            box-shadow: 0 0 20px #390099;
            will-change: transform;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Fixed game board resolution
        canvas.width = 480;
        canvas.height = 640;

        // Game states
        let score = 0;
        let lives = 3;
        let gameOver = false;
        let enemies = [];
        let bullets = [];

        // Player SpaceShip Object
        const player = {
            x: canvas.width / 2 - 20,
            y: canvas.height - 60,
            w: 40,
            h: 30,
            color: '#00ffff'
        };

        // Mouse tracking for controls
        window.addEventListener('mousemove', (e) => {
            if (gameOver) return;
            // Canvas ki absolute position screen par nikalna
            const rect = canvas.getBoundingClientRect();
            // Spaceship ko center align karke canvas boundary ke andar rakhna
            player.x = (e.clientX - rect.left) - player.w / 2;
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.w) player.x = canvas.width - player.w;
        });

        // Click to shoot
        window.addEventListener('click', () => {
            if (gameOver) {
                resetGame();
                return;
            }
            // Bullet launch points (Center of the ship)
            bullets.push({ x: player.x + player.w / 2 - 2, y: player.y, w: 4, h: 10, speed: 7 });
        });

        // Enemy spawning logic
        function spawnEnemy() {
            if (gameOver) return;
            const size = Math.random() * 20 + 20; // Varied alien sizes
            enemies.push({
                x: Math.random() * (canvas.width - size),
                y: -size,
                w: size,
                h: size,
                speed: Math.random() * 1.5 + 1,
                color: `hsl(${Math.random() * 60 + 340}, 100%, 60%)` // Red/Pink tones
            });
        }
        setInterval(spawnEnemy, 1000); // Har 1 second me naya alien aayega

        // Collision Detector Function (Hit Box Calculation)
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.w &&
                   rect1.x + rect1.w > rect2.x &&
                   rect1.y < rect2.y + rect2.h &&
                   rect1.y + rect1.h > rect2.y;
        }

        // Restart logic
        function resetGame() {
            score = 0;
            lives = 3;
            enemies = [];
            bullets = [];
            gameOver = false;
        }

        // Main Loop Engine
        function gameLoop() {
            // Screen clear
            ctx.fillStyle = '#020205';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (!gameOver) {
                // 1. Move and Draw Bullets
                for (let b = bullets.length - 1; b >= 0; b--) {
                    bullets[b].y -= bullets[b].speed;
                    ctx.fillStyle = '#ffff00';
                    ctx.fillRect(bullets[b].x, bullets[b].y, bullets[b].w, bullets[b].h);
                    
                    // Out of screen bullets delete karna
                    if (bullets[b].y < 0) bullets.splice(b, 1);
                }

                // 2. Move and Draw Enemies
                for (let e = enemies.length - 1; e >= 0; e--) {
                    enemies[e].y += enemies[e].speed;
                    ctx.fillStyle = enemies[e].color;
                    ctx.fillRect(enemies[e].x, enemies[e].y, enemies[e].w, enemies[e].h);

                    // Check bullet hit enemy
                    for (let b = bullets.length - 1; b >= 0; b--) {
                        if (checkCollision(bullets[b], enemies[e])) {
                            enemies.splice(e, 1);
                            bullets.splice(b, 1);
                            score += 10;
                            break;
                        }
                    }

                    if (!enemies[e]) continue;

                    // Check enemy hit player
                    if (checkCollision(enemies[e], player)) {
                        enemies.splice(e, 1);
                        lives--;
                        if (lives <= 0) gameOver = true;
                        continue;
                    }

                    // Bottom reach condition
                    if (enemies[e].y > canvas.height) {
                        enemies.splice(e, 1);
                        lives--;
                        if (lives <= 0) gameOver = true;
                    }
                }

                // 3. Draw Player Spaceship
                ctx.fillStyle = player.color;
                ctx.beginPath();
                ctx.moveTo(player.x + player.w / 2, player.y);
                ctx.lineTo(player.x, player.y + player.h);
                ctx.lineTo(player.x + player.w, player.y + player.h);
                ctx.closePath();
                ctx.fill();

                // 4. Draw HUD Dashboard (Score & Lives)
                ctx.fillStyle = '#ffffff';
                ctx.font = '16px Courier New';
                ctx.fillText(`SCORE: ${score}`, 20, 30);
                ctx.fillText(`LIVES: ${'❤️'.repeat(lives)}`, canvas.width - 140, 30);

            } else {
                // Game Over Screen Template
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#ff0055';
                ctx.font = '30px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);

                ctx.fillStyle = '#ffffff';
                ctx.font = '16px Courier New';
                ctx.fillText(`FINAL SCORE: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
                ctx.fillText("CLICK ANYWHERE TO RESTART", canvas.width / 2, canvas.height / 2 + 60);
                ctx.textAlign = 'start'; // Reset alignment
            }

            requestAnimationFrame(gameLoop);
        }

        // Start
        gameLoop();
    </script>
</body>
</html>
