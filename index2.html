<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Command Center 🌌</title>
    <style>
        /* Reset default browser gaps */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace; /* Ekdum hacker/scientific font */
        }

        /* Space background */
        body {
            background: radial-gradient(circle at center, #020514, #000105);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Moving Stars in Background */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.3) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 30px);
            background-size: 400px 400px, 250px 250px;
            background-position: 0 0, 30px 40px;
            animation: spaceMove 30s linear infinite;
            opacity: 0.6;
            z-index: 1;
        }

        @keyframes spaceMove {
            from { transform: translate(0, 0); }
            to { transform: translate(-50%, -50%); }
        }

        /* Center Text Container */
        .content {
            text-align: center;
            color: white;
            z-index: 10;
            pointer-events: none;
            padding: 20px;
        }

        .content h1 {
            font-size: 3.2rem;
            font-weight: 900;
            letter-spacing: 5px;
            text-shadow: 0 0 25px rgba(0, 255, 153, 0.7); /* Green glowing neon text */
            background: linear-gradient(45deg, #00ff99, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .content p {
            font-size: 1.1rem;
            color: #00ff99; /* Futuristic green text */
            letter-spacing: 2px;
            text-shadow: 0 0 5px rgba(0, 255, 153, 0.5);
        }

        /* The Moving Rocket Element */
        .rocket-cursor {
            position: fixed;
            width: 50px;
            height: 50px;
            font-size: 42px;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%) rotate(45deg);
            transition: transform 0.1s ease-out;
            filter: drop-shadow(0 0 15px #00ff99); /* Rocket glow colors matched */
        }

        /* Smoke/Fire Effect trail */
        .smoke {
            position: fixed;
            width: 8px;
            height: 8px;
            background: linear-gradient(#00ff99, #00f2fe);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            box-shadow: 0 0 12px #00ff99;
            animation: fadeSmoke 0.5s linear forwards;
        }

        @keyframes fadeSmoke {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Fresh Futuristic Command Text -->
    <div class="content">
        <h1>GALAXY COMMAND: ACTIVE</h1>
        <p>[ System online. Deep space scanning in progress... 🛰️ ]</p>
    </div>

    <!-- Rocket Emoji Element -->
    <div class="rocket-cursor" id="rocket">🚀</div>

    <!-- Javascript for movement -->
    <script>
        const rocket = document.getElementById('rocket');
        let currentX = window.innerWidth / 2;
        let currentY = window.innerHeight / 2;
        let targetX = currentX;
        let targetY = currentY;

        // Smooth movement animation
        function animate() {
            currentX += (targetX - currentX) * 0.15;
            currentY += (targetY - currentY) * 0.15;
            
            rocket.style.left = currentX + 'px';
            rocket.style.top = currentY + 'px';
            
            requestAnimationFrame(animate);
        }
        animate();

        // Mouse or Touch Move function
        function moveRocket(e) {
            let x = e.clientX || (e.touches && e.touches.clientX);
            let y = e.clientY || (e.touches && e.touches.clientY);
            
            if (x && y) {
                targetX = x;
                targetY = y;
                createSmoke(x, y);
            }
        }

        // Rocket ke piche neon sparks trail
        function createSmoke(x, y) {
            const smoke = document.createElement('div');
            smoke.classList.add('smoke');
            smoke.style.left = (x - 5) + 'px';
            smoke.style.top = (y + 15) + 'px';
            document.body.appendChild(smoke);
            
            setTimeout(() => {
                smoke.remove();
            }, 500);
        }

        // Event listeners
        window.addEventListener('mousemove', moveRocket);
        window.addEventListener('touchmove', moveRocket);
    </script>
</body>
</html>
