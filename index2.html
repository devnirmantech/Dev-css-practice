<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro GTA Mobile City</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #111;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            will-change: transform;
        }
        /* Mobile Controls Styling */
        .controls-container {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 10;
            pointer-events: none;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            pointer-events: auto;
        }
        .btn {
            width: 65px;
            height: 65px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.6);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .btn:active {
            background: rgba(0, 255, 200, 0.5);
            border-color: #00ffcc;
        }
        #hud {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #00ffcc;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 14px;
            pointer-events: none;
            border-left: 4px solid #00ffcc;
        }
    </style>
</head>
<body>

    <div id="hud">GTA RETRO CITY | SPEED: <span id="speed">0</span> KM/H</div>

    <!-- Mobile Touch UI Buttons -->
    <div class="controls-container">
        <div class="btn-group">
            <div class="btn" id="btnLeft">◀</div>
            <div class="btn" id="btnRight">▶</div>
        </div>
        <div class="btn-group">
            <div class="btn" id="btnBrake">S</div>
            <div class="btn" id="btnGas">W</div>
        </div>
    </div>

    <canvas id="gtaCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gtaCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Player Sports Car Object
        const car = {
            worldX: 500,
            worldY: 500,
            w: 18,
            h: 36,
            angle: 0,
            speed: 0,
            maxSpeed: 6,
            acc: 0.15,
            friction: 0.95,
            turnSpeed: 0.04
        };

        // Input States (Keyboard + Mobile Touch combo)
        const input = { forward: false, backward: false, left: false, right: false };

        // Keyboard triggers
        window.addEventListener('keydown', (e) => {
            if (e.key === 'w' || e.key === 'ArrowUp') input.forward = true;
            if (e.key === 's' || e.key === 'ArrowDown') input.backward = true;
            if (e.key === 'a' || e.key === 'ArrowLeft') input.left = true;
            if (e.key === 'd' || e.key === 'ArrowRight') input.right = true;
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'w' || e.key === 'ArrowUp') input.forward = false;
            if (e.key === 's' || e.key === 'ArrowDown') input.backward = false;
            if (e.key === 'a' || e.key === 'ArrowLeft') input.left = false;
            if (e.key === 'd' || e.key === 'ArrowRight') input.right = false;
        });

        // Mobile Touch triggers setup
        const setupTouch = (id, property) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); input[property] = true; });
            el.addEventListener('touchend', () => input[property] = false);
        };
        setupTouch('btnGas', 'forward');
        setupTouch('btnBrake', 'backward');
        setupTouch('btnLeft', 'left');
        setupTouch('btnRight', 'right');

        // Create Procedural GTA City Grid (Roads & Building blocks)
        const worldSize = 2000;
        const blocks = [];
        const blockSize = 160;
        const roadWidth = 80;

        for (let x = 100; x < worldSize; x += blockSize + roadWidth) {
            for (let y = 100; y < worldSize; y += blockSize + roadWidth) {
                blocks.push({
                    x: x,
                    y: y,
                    w: blockSize,
                    h: blockSize,
                    color: Math.random() > 0.5 ? '#1a1a24' : '#222230',
                    height3D: Math.random() * 60 + 40 // Fake 3D projection height factor
                });
            }
        }

        function update() {
            // Acceleration Engine
            if (input.forward) {
                if (car.speed < car.maxSpeed) car.speed += car.acc;
            } else if (input.backward) {
                if (car.speed > -car.maxSpeed / 2) car.speed -= car.acc;
            } else {
                car.speed *= car.friction;
            }

            // Turning physics mechanics
            if (Math.abs(car.speed) > 0.2) {
                const dir = car.speed > 0 ? 1 : -1;
                if (input.left) car.angle -= car.turnSpeed * dir;
                if (input.right) car.angle += car.turnSpeed * dir;
            }

            // Vector math position mapping
            car.worldX += Math.sin(car.angle) * car.speed;
            car.worldY -= Math.cos(car.angle) * car.speed;

            // Map boundary constraints
            if (car.worldX < 0) car.worldX = 0;
            if (car.worldY < 0) car.worldY = 0;
            if (car.worldX > worldSize) car.worldX = worldSize;
            if (car.worldY > worldSize) car.worldY = worldSize;

            document.getElementById('speed').innerText = Math.round(Math.abs(car.speed) * 20);
        }

        function draw() {
            // Draw Asphalt Dark Ground Base
            ctx.fillStyle = '#111116';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // GTA Style Camera Follow matrix
            const camX = canvas.width / 2 - car.worldX;
            const camY = canvas.height / 2 - car.worldY;

            // 1. Draw Road markings (Lines)
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.lineWidth = 2;
            for (let i = 0; i < worldSize; i += 40) {
                ctx.strokeRect(camX, camY, worldSize, worldSize);
            }

            // 2. Draw City Blocks with Pseudo 3D Wall projections
            blocks.forEach(b => {
                const screenX = b.x + camX;
                const screenY = b.y + camY;

                // Render building roof base
                ctx.fillStyle = b.color;
                ctx.fillRect(screenX, screenY, b.w, b.h);

                // Fake 3D Effect: Camera distance vector ke hisab se building shadow drop karna
                ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
                const dx = (screenX + b.w/2) - canvas.width/2;
                const dy = (screenY + b.h/2) - canvas.height/2;
                
                ctx.beginPath();
                ctx.moveTo(screenX, screenY);
                ctx.lineTo(screenX + dx * 0.1, screenY + dy * 0.1);
                ctx.lineTo(screenX + b.w + dx * 0.1, screenY + dy * 0.1);
                ctx.lineTo(screenX + b.w, screenY);
                ctx.fill();
            });

            // 3. Draw Player Sports Car (Rotated context)
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate(car.angle);

            // Car Body Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.fillRect(-car.w/2 + 4, -car.h/2 + 4, car.w, car.h);

            // Car Chassis
            ctx.fillStyle = '#ff0055'; // Hot Neon Pink Car
            ctx.fillRect(-car.w/2, -car.h/2, car.w, car.h);

            // Windshield glass window
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(-car.w/2 + 2, -car.h/4, car.w - 4, 6);
            
            // Headlights
            ctx.fillStyle = '#ffff00';
            ctx.fillRect(-car.w/2 + 2, -car.h/2, 3, 2);
            ctx.fillRect(car.w/2 - 5, -car.h/2, 3, 2);

            ctx.restore();
        }

        function engineLoop() {
            update();
            draw();
            requestAnimationFrame(engineLoop);
        }

        // Run Local Code Template Engine
        engineLoop();
    </script>
</body>
</html>
