<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Quality Reptile Interactive Cursor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #050508; /* Ultra dark modern background */
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Quality Improvement: Monitor ki resolution ke hisaab se Canvas pixel ratio fix karna (No Blurriness)
        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            ctx.scale(dpr, dpr);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        var Input = {
            keys: [],
            mouse: {
                left: false, right: false, middle: false,
                x: window.innerWidth / 2,
                y: window.innerHeight / 2
            }
        };

        document.addEventListener("mousedown", (e) => {
            if (e.button === 0) Input.mouse.left = true;
            if (e.button === 1) Input.mouse.middle = true;
            if (e.button === 2) Input.mouse.right = true;
        });
        document.addEventListener("mouseup", (e) => {
            if (e.button === 0) Input.mouse.left = false;
            if (e.button === 1) Input.mouse.middle = false;
            if (e.button === 2) Input.mouse.right = false;
        });
        document.addEventListener('mousemove', (e) => {
            Input.mouse.x = e.clientX;
            Input.mouse.y = e.clientY;
        });

        class Segment {
            constructor(x, y, size, angle = 0) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.angle = angle;
            }
        }

        const segmentsCount = 38; // Tapering improve karne ke liye thode segments badhaye
        const segmentLength = 10; // Chote segments se animation aur smooth chalti hai
        const segments = [];

        for (let i = 0; i < segmentsCount; i++) {
            // Smooth natural tail design ke liye tail size calculate kiya
            let size = 16 * Math.pow(1 - (i / segmentsCount), 0.6);
            segments.push(new Segment(Input.mouse.x, Input.mouse.y, Math.max(2, size)));
        }

        function animate() {
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            
            // Head Movement
            let head = segments[0];
            let dx = Input.mouse.x - head.x;
            let dy = Input.mouse.y - head.y;
            head.angle = Math.atan2(dy, dx);
            head.x += dx * 0.2; // Extra responsive tracking
            head.y += dy * 0.2;
            
            // Body Follow Logic (Kinematics)
            for (let i = 1; i < segmentsCount; i++) {
                let prev = segments[i - 1];
                let curr = segments[i];
                
                let targetX = prev.x - Math.cos(prev.angle) * segmentLength;
                let targetY = prev.y - Math.sin(prev.angle) * segmentLength;
                
                curr.x += (targetX - curr.x) * 0.35;
                curr.y += (targetY - curr.y) * 0.35;
                curr.angle = Math.atan2(prev.y - curr.y, prev.x - curr.x);
            }
            
            // Quality Improvement: Glow and Neon shadows add karna
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'rgba(255, 255, 255, 0.4)';
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.85)';
            ctx.lineWidth = 2;
            
            // 1. Spine Linkage: Sare segments ko smooth continuous line se jodna
            ctx.beginPath();
            ctx.moveTo(segments[0].x, segments[0].y);
            for(let i = 1; i < segmentsCount; i++){
                ctx.lineTo(segments[i].x, segments[i].y);
            }
            ctx.stroke();

            // 2. Ribs and Joints Drawing
            for (let i = 0; i < segmentsCount; i++) {
                let curr = segments[i];
                
                // Joints Draw karna
                ctx.beginPath();
                ctx.arc(curr.x, curr.y, curr.size / 2, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                
                // Spine Ribs (Side spikes)
                if (i > 1 && i < segmentsCount - 6) {
                    let width = curr.size * 1.6;
                    let orthoAngle = curr.angle + Math.PI / 2;
                    
                    // Left Rib
                    ctx.beginPath();
                    ctx.moveTo(curr.x, curr.y);
                    ctx.lineTo(curr.x + Math.cos(orthoAngle) * width, curr.y + Math.sin(orthoAngle) * width);
                    ctx.stroke();
                    
                    // Right Rib
                    ctx.beginPath();
                    ctx.moveTo(curr.x, curr.y);
                    ctx.lineTo(curr.x - Math.cos(orthoAngle) * width, curr.y - Math.sin(orthoAngle) * width);
                    ctx.stroke();
                }
            }
            
            // Shadow reset taaki frames heavy na ho aur performance smooth rahe
            ctx.shadowBlur = 0;
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
