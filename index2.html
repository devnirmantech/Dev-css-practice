<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reptile Interactive Cursor</title>
    <style>
        /* CSS CODE HERE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0b0b;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        // JAVASCRIPT CODE HERE
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Mouse tracking object
        var Input = {
            keys: [],
            mouse: {
                left: false,
                right: false,
                middle: false,
                x: window.innerWidth / 2,
                y: window.innerHeight / 2
            }
        };

        // Mouse events
        document.addEventListener("mousedown", function(event) {
            if (event.button === 0) { Input.mouse.left = true; }
            if (event.button === 1) { Input.mouse.middle = true; }
            if (event.button === 2) { Input.mouse.right = true; }
        });

        document.addEventListener("mouseup", function(event) {
            if (event.button === 0) { Input.mouse.left = false; }
            if (event.button === 1) { Input.mouse.middle = false; }
            if (event.button === 2) { Input.mouse.right = false; }
        });

        document.addEventListener('mousemove', function(event) {
            Input.mouse.x = event.clientX;
            Input.mouse.y = event.clientY;
        });

        // Reptile Structure
        class Segment {
            constructor(x, y, size, angle = 0) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.angle = angle;
            }
        }

        const segmentsCount = 35;
        const segmentLength = 12;
        const segments = [];

        for (let i = 0; i < segmentsCount; i++) {
            segments.push(new Segment(Input.mouse.x, Input.mouse.y, Math.max(2, 18 - i * 0.4)));
        }

        // Animation Loop
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let head = segments[0];
            let dx = Input.mouse.x - head.x;
            let dy = Input.mouse.y - head.y;
            head.angle = Math.atan2(dy, dx);
            head.x += dx * 0.15;
            head.y += dy * 0.15;
            
            for (let i = 1; i < segmentsCount; i++) {
                let prev = segments[i - 1];
                let curr = segments[i];
                
                let targetX = prev.x - Math.cos(prev.angle) * segmentLength;
                let targetY = prev.y - Math.sin(prev.angle) * segmentLength;
                
                curr.x += (targetX - curr.x) * 0.4;
                curr.y += (targetY - curr.y) * 0.4;
                curr.angle = Math.atan2(prev.y - curr.y, prev.x - curr.x);
            }
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.lineWidth = 1.5;
            
            for (let i = 0; i < segmentsCount; i++) {
                let curr = segments[i];
                
                ctx.beginPath();
                ctx.arc(curr.x, curr.y, curr.size / 2, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                
                if (i > 2 && i < segmentsCount - 5) {
                    let width = curr.size * 1.5;
                    let orthoAngle = curr.angle + Math.PI / 2;
                    
                    ctx.beginPath();
                    ctx.moveTo(curr.x, curr.y);
                    ctx.lineTo(curr.x + Math.cos(orthoAngle) * width, curr.y + Math.sin(orthoAngle) * width);
                    ctx.stroke();
                    
                    ctx.beginPath();
                    ctx.moveTo(curr.x, curr.y);
                    ctx.lineTo(curr.x - Math.cos(orthoAngle) * width, curr.y - Math.sin(orthoAngle) * width);
                    ctx.stroke();
                }
            }
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
