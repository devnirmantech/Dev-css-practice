<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hold to Trigger Lightning Storm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #020204;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            will-change: transform;
            filter: drop-shadow(0 0 12px #00ffff);
        }
        .instruction {
            color: rgba(255, 255, 255, 0.3);
            font-size: 16px;
            letter-spacing: 3px;
            pointer-events: none;
            z-index: 10;
            text-transform: uppercase;
            animation: pulse 1.5s infinite alternate;
        }
        @keyframes pulse {
            0% { opacity: 0.2; }
            100% { opacity: 0.7; }
        }
    </style>
</head>
<body>

    <div class="instruction">CLICK & HOLD ANYWHERE TO UNLEASH STORM</div>
    <canvas id="lightningCanvas"></canvas>

    <script>
        const canvas = document.getElementById('lightningCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const mouse = { x: 0, y: 0 };
        let isHolding = false; // Hold state track karne ke liye

        // Mouse events for Hold functionality
        window.addEventListener('mousedown', (e) => {
            isHolding = true;
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('mouseup', () => {
            isHolding = false;
        });

        window.addEventListener('mousemove', (e) => {
            if (isHolding) {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            }
        });

        // Touch support for mobile users
        window.addEventListener('touchstart', (e) => {
            isHolding = true;
            if(e.touches[0]) {
                mouse.x = e.touches[0].clientX;
                mouse.y = e.touches[0].clientY;
            }
        });
        window.addEventListener('touchend', () => isHolding = false);
        window.addEventListener('touchmove', (e) => {
            if (isHolding && e.touches[0]) {
                mouse.x = e.touches[0].clientX;
                mouse.y = e.touches[0].clientY;
            }
        });

        // Recursive Lightning Path generator (Fractal math logic)
        function createLightning(startX, startY, endX, endY, segments, displace) {
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            
            let currentX = startX;
            let currentY = startY;

            for (let i = 1; i <= segments; i++) {
                let t = i / segments;
                let targetX = startX + (endX - startX) * t;
                let targetY = startY + (endY - startY) * t;

                // Random zig-zag displacement calculation
                if (i < segments) {
                    targetX += (Math.random() - 0.5) * displace;
                    targetY += (Math.random() - 0.5) * displace;
                }

                ctx.lineTo(targetX, targetY);
                currentX = targetX;
                currentY = targetY;
            }
            ctx.stroke();
        }

        function animate() {
            // Speed Optimize Trail: Halka fade effect jisse purani bijli turant saaf ho jaye aur lag na kare
            ctx.fillStyle = 'rgba(2, 2, 4, 0.25)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (isHolding) {
                // Screen ka center point jahan se bijli niklegi
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;

                // Har frame par 3 alag colors ki lightning lines draw karna
                const colors = ['#00ffff', '#ff00ff', '#ffffff'];
                
                for (let i = 0; i < 3; i++) {
                    ctx.strokeStyle = colors[i];
                    ctx.lineWidth = Math.random() * 3 + 1;
                    
                    // Main bolt
                    createLightning(centerX, centerY, mouse.x, mouse.y, 12, 45);
                    
                    // Branching: side me tootne wali chhoti bijliyan
                    if (Math.random() > 0.6) {
                        let branchX = mouse.x + (Math.random() - 0.5) * 150;
                        let branchY = mouse.y + (Math.random() - 0.5) * 150;
                        createLightning(centerX, centerY, branchX, branchY, 8, 30);
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
